name: Build & Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm run install:all

      - name: Build
        if: steps.check_tag.outputs.exists == 'false'
        run: npm run build

      - name: Package
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          tar -czf file-manager.tar.gz \
            --exclude='backend/node_modules' \
            --exclude='backend/src' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/src' \
            backend/ frontend/dist/

      - name: Extract changelog
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk "/^## v$VERSION/{flag=1; print; next} /^## / && flag{exit} flag" CHANGELOG.md > /tmp/changelog.md
          echo "--- changelog preview ---"
          cat /tmp/changelog.md

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: /tmp/changelog.md
          files: file-manager.tar.gz
          generate_release_notes: false